const SAMPLE = 30;   // so the ngau nhien hien o trang chu
const grid=document.getElementById('grid'), q=document.getElementById('q'), count=document.getElementById('count');
const moreBox=document.getElementById('moreBox');
function yen(n){return n? '¥'+Number(n).toLocaleString('ja-JP'):'—';}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function draw(list){
  count.textContent = list.length + ' 件';
  if(!list.length){grid.innerHTML='<div class="empty">該当なし</div>';return;}
  grid.innerHTML = list.map(c=>{
    const vn = c.vname? ' ('+c.vname+')':'';
    const lang = c.lang==='en'?' [英]':'';
    const img = c.slug
      ? `<div class="thumb"><img loading="lazy" src="images/${c.slug}.webp" alt="" onerror="this.parentElement.classList.add('noimg')"></div>`
      : `<div class="thumb noimg"></div>`;
    return `<a class="card" href="card_${c.id}.html">
      ${img}
      <div class="eb">${c.num}${lang}</div>
      <div class="cn">${c.char}</div>
      <div class="vr">${c.vcode}${vn}</div>
      <div class="pr"><span class="lb">PSA10 最安値</span><span class="y">¥</span>${c.psa10?Number(c.psa10).toLocaleString('ja-JP'):'—'}</div>
    </a>`;}).join('');
}
function filter(){
  const s=q.value.trim().toLowerCase();
  if(!s){
    // khong tim kiem: hien 30 the NGAU NHIEN + nut xem tat ca
    draw(shuffle(CARDS).slice(0,SAMPLE));
    count.textContent = 'ランダム '+Math.min(SAMPLE,CARDS.length)+' 件 / 全 '+CARDS.length+' 件';
    moreBox.style.display='';
  } else {
    // tim kiem: hien het ket qua, an nut
    draw(CARDS.filter(c=>
      (c.num+' '+c.char+' '+c.vcode+' '+c.vname+' '+c.set).toLowerCase().includes(s)));
    moreBox.style.display='none';
  }
}
q.addEventListener('input',filter); filter();
