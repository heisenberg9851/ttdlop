<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ワンピース PSA10 相場・価格検索</title>
<style>
:root{--ink:#16181C;--muted:#72777D;--line:#E3E5DF;--slab:#1B2A4A;--deal:#12855C;--paper:#F3F4F1}
*{margin:0;box-sizing:border-box;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Noto Sans JP",sans-serif}
body{background:var(--paper);color:var(--ink);line-height:1.6}
.num{font-variant-numeric:tabular-nums}
.wrap{max-width:880px;margin:0 auto;padding:32px 20px 60px}
.brand{font-size:20px;font-weight:800;letter-spacing:.02em}
.brand small{color:var(--muted);font-weight:600;font-size:11px;letter-spacing:.14em;margin-left:8px}
h1{font-size:26px;font-weight:800;margin:20px 0 6px}
.sub{color:var(--muted);font-size:13px;margin-bottom:20px}
#q{width:100%;padding:14px 16px;font-size:16px;border:1px solid var(--line);border-radius:12px;background:#fff}
#q:focus{outline:2px solid var(--deal);border-color:transparent}
.count{font-size:12px;color:var(--muted);margin:14px 2px 10px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.card{display:block;text-decoration:none;color:inherit;background:#fff;border:1px solid var(--line);
  border-radius:12px;padding:16px;transition:transform .1s,border-color .1s}
.card:hover{transform:translateY(-2px);border-color:var(--slab)}
.eb{font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--deal)}
.cn{font-size:15px;font-weight:800;margin:4px 0 2px}
.vr{font-size:12px;color:var(--muted)}
.pr{margin-top:10px;font-size:18px;font-weight:800;color:var(--slab)}
.pr .y{font-size:11px}.pr .lb{font-size:10px;color:var(--muted);font-weight:600;display:block}
.empty{color:var(--muted);padding:30px;text-align:center}
footer{margin-top:40px;text-align:center;font-size:11px;color:var(--muted)}
</style></head><body><div class="wrap">
<div class="brand">相場ノート <small>ONE PIECE PSA10</small></div>
<h1>カード番号で相場を検索</h1>
<div class="sub">カード右下の番号（例：OP13-118）またはキャラ名で検索できます。</div>
<input id="q" type="text" placeholder="OP13-118 / ルフィ ..." autofocus>
<div class="count" id="count"></div>
<div class="grid" id="grid"></div>
<footer>データ出典：スニーカーダンク · 価格はPSA10「販売中」最安値（参考）</footer>
</div>
<script>
const CARDS = [{"id": "102650", "num": "ST01-001", "vcode": "L", "vname": "シリアルナンバー入り", "lang": "ja", "char": "モンキー・D・ルフィ", "set": "フラッグシップバトル優勝記念品", "psa10": 13900000}, {"id": "135441", "num": "ST01-012", "vcode": "SR-P", "vname": "サインルフィ", "lang": "ja", "char": "モンキー・D・ルフィ", "set": "新時代の主役", "psa10": 1400000}, {"id": "221690", "num": "P-033", "vcode": "P", "vname": "", "lang": "en", "char": "モンキー・D・ルフィ", "set": "チャンピオンシップ 2023 イベントパック ファイナリスト Ver", "psa10": 22600000}, {"id": "315324", "num": "ST10-006", "vcode": "SR", "vname": "", "lang": "ja", "char": "モンキー・D・ルフィ", "set": "ONE PIECE DAY'24 来場者特典", "psa10": 115000}, {"id": "503454", "num": "OP05-060", "vcode": "L-SPC", "vname": "", "lang": "ja", "char": "モンキー・D・ルフィ", "set": "アニメ 25th コレクション", "psa10": 1080000}, {"id": "515455", "num": "OP05-119", "vcode": "SEC-SPC", "vname": "3周年スペシャルカード 金背景", "lang": "ja", "char": "モンキー・D・ルフィ", "set": "神速の拳", "psa10": 1999999}, {"id": "635880", "num": "ST21-015", "vcode": "SR", "vname": "", "lang": "ja", "char": "ロロノア・ゾロ", "set": "フラッグシップバトル ベスト8記念品", "psa10": 91000}, {"id": "676003", "num": "OP13-118", "vcode": "SEC-RSP", "vname": "レッドコミパラ", "lang": "ja", "char": "モンキー・Ｄ・ルフィ", "set": "受け継がれる意志", "psa10": 3590000}, {"id": "712256", "num": "開封済", "vcode": "", "vname": "", "lang": "ja", "char": "ドン!!カード : ロビン&ウタ&ナミ&ハンコック スーパーパラレル", "set": "ワンピース ヒロインズエディション スペシャルセット", "psa10": 83000}, {"id": "729311", "num": "OP08-106", "vcode": "SR", "vname": "開封済み", "lang": "ja", "char": "ナミ", "set": "シリアルナンバー入りナミ ゲットキャンペーン", "psa10": 6000000}, {"id": "735734", "num": "OP12-020", "vcode": "L", "vname": "シリアルナンバー入り :優勝記念品 :開封済", "lang": "ja", "char": "ロロノア・ゾロ", "set": "フラッグシップバトル2026 1月", "psa10": 1277777}, {"id": "743994", "num": "OP11-041", "vcode": "L", "vname": "", "lang": "ja", "char": "ナミ", "set": "オフィシャルプレイマット＆カードセット ホールケーキアイランドアーク", "psa10": 100000}, {"id": "764510", "num": "EB04-061", "vcode": "SEC", "vname": "シリアルナンバー入り :優勝記念品 :開封済", "lang": "ja", "char": "モンキー・D・ルフィ", "set": "フラッグシップバトル", "psa10": 2900000}, {"id": "764629", "num": "OP15-086", "vcode": "SR-P", "vname": "", "lang": "ja", "char": "ナミ", "set": "神の島の冒険", "psa10": 235000}, {"id": "766293", "num": "OP14-112", "vcode": "SR", "vname": "上位記念品", "lang": "ja", "char": "ボア・ハンコック", "set": "チャンピオンシップ26-27 シーズン1 BCGフェスト予選", "psa10": 3680000}, {"id": "793190", "num": "ST30-001", "vcode": "L-P", "vname": "", "lang": "ja", "char": "ルフィ＆エース", "set": "ルフィ&エース ボーナスパック", "psa10": 175000}, {"id": "822582", "num": "OP14-084", "vcode": "SR-SPC", "vname": "", "lang": "ja", "char": "ミス・オールサンデー", "set": "決戦の刻", "psa10": 238000}, {"id": "822583", "num": "ST15-005", "vcode": "SR-SPC", "vname": "", "lang": "ja", "char": "ポートガス・D・エース", "set": "決戦の刻", "psa10": null}, {"id": "822602", "num": "OP16-065", "vcode": "SR-SP", "vname": "コミパラ", "lang": "ja", "char": "サカズキ", "set": "決戦の刻", "psa10": 842222}, {"id": "837244", "num": "P-112", "vcode": "P", "vname": "参加記念品", "lang": "ja", "char": "ナミ", "set": "クルーバトル 麦わらの一味限定戦", "psa10": 55000}];
const grid=document.getElementById('grid'), q=document.getElementById('q'), count=document.getElementById('count');
function yen(n){return n? '¥'+Number(n).toLocaleString('ja-JP'):'—';}
function draw(list){
  count.textContent = list.length + ' 件';
  if(!list.length){grid.innerHTML='<div class="empty">該当なし</div>';return;}
  grid.innerHTML = list.map(c=>{
    const vn = c.vname? ' ('+c.vname+')':'';
    const lang = c.lang==='en'?' [英]':'';
    return `<a class="card" href="card_${c.id}.html">
      <div class="eb">${c.num}${lang}</div>
      <div class="cn">${c.char}</div>
      <div class="vr">${c.vcode}${vn}</div>
      <div class="pr"><span class="lb">PSA10 最安値</span><span class="y">¥</span>${c.psa10?Number(c.psa10).toLocaleString('ja-JP'):'—'}</div>
    </a>`;}).join('');
}
function filter(){
  const s=q.value.trim().toLowerCase();
  draw(!s?CARDS:CARDS.filter(c=>
    (c.num+' '+c.char+' '+c.vcode+' '+c.vname+' '+c.set).toLowerCase().includes(s)));
}
q.addEventListener('input',filter); draw(CARDS);
</script></body></html>
